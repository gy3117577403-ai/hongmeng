name: Android WebView APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-webview-app/**"
      - ".github/workflows/android-webview-apk.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android-webview-app
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hongmeng-workorder-webview-debug-apk
          path: android-webview-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
